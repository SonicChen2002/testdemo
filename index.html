<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給老師的感謝信</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="letter-container">
        <div class="letter-card">
            <h2 class="salutation">親愛的老師：</h2>
            
            <p>您好！</p>
            
            <p>這學期的中文課快要結束了，我寫這封信是想謝謝老師這半年來的教導。</p>
            
            <p>在您的課堂上，我不僅學到了很多生詞和語法，聽說讀寫也進步了不少。我也因為這堂課，更了解台灣的文化，覺得非常有意思。</p>
            
            <p>特別謝謝老師對我很有耐心。當我有聽不懂的地方，老師總是用簡單的方式解釋給我聽，讓我更有自信開口說中文。在您的課堂學習，我覺得很快樂。</p>
            
            <p>雖然學期結束了，但我會繼續努力練習中文。希望以後還有機會跟老師聊天！</p>
            
            <div class="closing">
                <p>祝您 身體健康、工作順利！</p>
                <p class="signature">學生 [您的名字] 敬上</p>
                <p class="date">2026年3月24日</p>
            </div>
        </div>
    </div>
</body>
</html>
